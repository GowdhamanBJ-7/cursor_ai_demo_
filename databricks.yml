bundle:
  name: nyc-taxi-medallion

resources:
  jobs:
    nyc_taxi_medallion_etl:
      name: nyc_taxi_medallion_pipeline

      tasks:
        - task_key: etl
          spark_python_task:
            python_file: pipeline/etl_pipeline.py

          # ✅ REQUIRED for serverless
          environment_key: default

      # ✅ Define environment (serverless)
      environments:
        - environment_key: default
          spec:
            client: "2"

      # ✅ Scheduling
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "Asia/Kolkata"

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/bundles/${bundle.name}/dev

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/bundles/${bundle.name}/prod